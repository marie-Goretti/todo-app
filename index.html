<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      height: fit-content;
    }

    h1 {
      text-align: center;
      color: #1a1a2e;
      font-size: 28px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 28px;
    }

    .input-zone {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border 0.2s;
    }

    input[type="text"]:focus {
      border-color: #6c63ff;
    }

    button.add-btn {
      background: #6c63ff;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.add-btn:hover { background: #574fd6; }

    .error {
      color: #e74c3c;
      font-size: 13px;
      margin-top: -16px;
      margin-bottom: 12px;
      padding-left: 4px;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 16px;
      font-size: 13px;
      color: #888;
    }

    .stats span { font-weight: bold; color: #6c63ff; }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
      background: #f8f9ff;
      border: 1px solid #ececff;
      transition: all 0.2s;
    }

    .todo-item:hover { box-shadow: 0 2px 8px rgba(108,99,255,0.1); }

    .todo-item.completed { opacity: 0.6; background: #f0fff4; border-color: #c3f0ca; }

    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c63ff;
      cursor: pointer;
    }

    .todo-title {
      flex: 1;
      font-size: 15px;
      color: #333;
    }

    .todo-item.completed .todo-title {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
      padding: 4px 8px;
      border-radius: 6px;
    }

    .delete-btn:hover { color: #e74c3c; background: #fff0f0; }

    .empty {
      text-align: center;
      color: #bbb;
      padding: 40px 0;
      font-size: 15px;
    }

    .empty span { display: block; font-size: 40px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>
    <p class="subtitle">Gérez vos tâches facilement</p>

    <div class="input-zone">
      <input type="text" id="todoInput" placeholder="Ajouter une tâche..." />
      <button class="add-btn" onclick="addTodo()">+</button>
    </div>
    <div class="error" id="errorMsg"></div>

    <div class="stats">
      <div>Total : <span id="totalCount">0</span></div>
      <div>Complétées : <span id="completedCount">0</span></div>
      <div>Restantes : <span id="remainingCount">0</span></div>
    </div>

    <ul class="todo-list" id="todoList"></ul>
  </div>

  <script>
    let todos = [];
    let nextId = 1;

    function addTodo() {
      const input = document.getElementById('todoInput');
      const errorMsg = document.getElementById('errorMsg');
      const title = input.value;

      if (!title || title.trim() === '') {
        errorMsg.textContent = '⚠️ Le titre ne peut pas être vide !';
        return;
      }

      errorMsg.textContent = '';

      const todo = {
        id: nextId++,
        title: title.trim(),
        completed: false
      };

      todos.push(todo);
      input.value = '';
      render();
    }

    function completeTodo(id) {
      const todo = todos.find(t => t.id === id);
      if (todo) todo.completed = !todo.completed;
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      render();
    }

    function render() {
      const list = document.getElementById('todoList');
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('completedCount').textContent = completed;
      document.getElementById('remainingCount').textContent = total - completed;

      if (todos.length === 0) {
        list.innerHTML = `
          <div class="empty">
            Aucune tâche pour l'instant !
          </div>`;
        return;
      }

      list.innerHTML = todos.map(todo => `
        <li class="todo-item ${todo.completed ? 'completed' : ''}">
          <input type="checkbox" ${todo.completed ? 'checked' : ''}
            onchange="completeTodo(${todo.id})" />
          <span class="todo-title">${todo.title}</span>
          <button class="delete-btn" onclick="deleteTodo(${todo.id})">🗑️</button>
        </li>
      `).join('');
    }

    // Ajouter avec la touche Entrée
    document.getElementById('todoInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addTodo();
    });

    render();
  </script>
</body>
</html>
